  .tv-screen {
    position: absolute;
    left: var(--screen-left);
    top: var(--screen-top);
    width: var(--screen-width);
    height: var(--screen-height);
    overflow: hidden;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.55), inset 0 0 12px rgba(0,0,0,0.8);
    background: #000;
  }
  .tv-screen iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    filter: saturate(0.92) contrast(1.05) brightness(0.95) hue-rotate(-4deg);
  }
  .tv-screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.22) 0px,
      rgba(0,0,0,0.22) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 3;
    mix-blend-mode: multiply;
    animation: flicker 7s infinite;
  }
  .tv-screen::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%),
      linear-gradient(90deg, rgba(255,0,80,0.04), transparent 10%, transparent 90%, rgba(0,140,255,0.04));
    pointer-events: none;
    z-index: 4;
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    48% { opacity: 1; }
    50% { opacity: 0.88; }
    52% { opacity: 1; }
    85% { opacity: 1; }
    86% { opacity: 0.92; }
    87% { opacity: 1; }
  }
