<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Channel 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --video-left: 35.5%;
    --video-top: 30.0%;
    --video-width: 42%;
    --video-height: 27%;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #070605;
    color: #b8a98a;
    font-family: 'VT323', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    padding: 18px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Major Mono Display', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #7a6a4d;
    text-transform: uppercase;
    max-width: 520px;
    margin: 0 auto;
  }
  header .right { font-family: 'VT323', monospace; font-size: 17px; letter-spacing: 0.2em; }
  header .blink { animation: blink 1.2s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  main { display: flex; align-items: center; justify-content: center; padding: 16px; }

/* Fixed aspect-ratio container — positions are stable even before the image loads */
.scene {
position: relative;
width: 100%;
max-width: 520px;
aspect-ratio: 1024 / 1536;
background: #000;
filter: drop-shadow(0 30px 50px rgba(0,0,0,0.7));
}

/* Room image — the base layer */
.room {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
display: block;
}

/* Iframe sits ON TOP of the image, over the TV screen */
.tv-video {
position: absolute;
left: var(–video-left);
top: var(–video-top);
width: var(–video-width);
height: var(–video-height);
background: #000;
overflow: hidden;
z-index: 2;
}
.tv-video iframe {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
border: 0;
display: block;
}

/* Unmute prompt — same position as iframe, on top of it */
.unmute-overlay {
position: absolute;
left: var(–video-left);
top: var(–video-top);
width: var(–video-width);
height: var(–video-height);
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 6px;
background: rgba(0,0,0,0.55);
color: #f4d799;
font-family: ‘VT323’, monospace;
z-index: 3;
cursor: pointer;
transition: opacity 0.4s ease;
text-shadow: 0 0 8px rgba(255,200,100,0.6);
line-height: 1.1;
}
.unmute-overlay.hidden { opacity: 0; pointer-events: none; }
.unmute-overlay .icon { font-size: clamp(20px, 3.5vw, 32px); }
.unmute-overlay .label {
font-size: clamp(10px, 1.6vw, 14px);
letter-spacing: 0.2em;
text-transform: uppercase;
animation: blink 1.4s steps(2) infinite;
}

.deck {
max-width: 520px;
margin: 14px auto 20px;
padding: 12px 14px;
display: flex;
gap: 8px;
align-items: center;
justify-content: center;
flex-wrap: wrap;
background: linear-gradient(180deg, #1a1613, #0d0b09);
border: 1px solid #2a231c;
border-radius: 6px;
box-shadow: inset 0 1px 0 rgba(255,220,160,0.08), 0 6px 24px rgba(0,0,0,0.6);
}
.deck .btn {
appearance: none; border: none; cursor: pointer;
background: linear-gradient(180deg, #2b2420, #16110e);
color: #e0caa0;
font-family: ‘VT323’, monospace;
font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
padding: 9px 11px; min-width: 62px; border-radius: 3px;
box-shadow: inset 0 1px 0 rgba(255,230,180,0.12), inset 0 -2px 0 rgba(0,0,0,0.5), 0 2px 0 rgba(0,0,0,0.6);
display: inline-flex; align-items: center; gap: 5px;
}
.deck .btn:active { transform: translateY(2px); }
.deck .btn .glyph { font-size: 14px; color: #f2c86a; }
.deck .btn.on {
color: #ffdf8f;
box-shadow: inset 0 1px 0 rgba(255,230,180,0.18), inset 0 -2px 0 rgba(0,0,0,0.5), 0 0 10px rgba(242,200,106,0.35);
}
.deck .btn.on .glyph { color: #ffdf8f; }

footer {
padding: 6px 24px 18px;
display: flex; justify-content: space-between;
font-family: ‘VT323’, monospace; font-size: 13px;
color: #5a4e37; letter-spacing: 0.15em; text-transform: uppercase;
max-width: 520px;
margin: 0 auto;
}
</style>

</head>

        id="player"
        src="https://www.youtube.com/embed/videoseries?list=PLKEGvtmSTe0ITrIBLHfmepntlncCbYVkO&autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1"

        allowfullscreen></iframe>

    <div class="unmute-overlay" id="unmuteOverlay">
      <div class="icon">&#9836;</div>
      <div class="label">tap for sound</div>

</main>

<div class="deck" role="toolbar">
  <button class="btn" id="btnPrev"><span class="glyph">&#9198;</span> prev</button>
  <button class="btn" id="btnPlay"><span class="glyph">&#9199;</span> play</button>
  <button class="btn" id="btnNext"><span class="glyph">&#9197;</span> next</button>
  <button class="btn" id="btnShuffle"><span class="glyph">&#128256;</span> shuf</button>
  <button class="btn" id="btnMute"><span class="glyph">&#128266;</span> sound</button>
</div>

<footer>
  <div>no signal</div>
  <div>sp &middot; stereo</div>
</footer>

<script>
  (function(){
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  })();

  var player = null;
  var shuffleOn = false;
  var isMuted = true;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      events: {
        'onReady': function(e){ try { e.target.playVideo(); } catch(err) {} },
        'onStateChange': function(e){
          var btn = document.getElementById('btnPlay');
          if (e.data === YT.PlayerState.PLAYING) btn.innerHTML = '<span class="glyph">&#9208;</span> pause';
          else btn.innerHTML = '<span class="glyph">&#9199;</span> play';
        }
      }
    });
  }
  function safeCall(fn){ if (!player) return; try { fn(); } catch(err) { console.warn(err); } }

  document.getElementById('btnPrev').addEventListener('click', function(){ safeCall(function(){ player.previousVideo(); }); });
  document.getElementById('btnNext').addEventListener('click', function(){ safeCall(function(){ player.nextVideo(); }); });
  document.getElementById('btnPlay').addEventListener('click', function(){
    safeCall(function(){
      var s = player.getPlayerState();
      if (s === 1) player.pauseVideo(); else player.playVideo();
    });
  });
  document.getElementById('btnShuffle').addEventListener('click', function(){
    shuffleOn = !shuffleOn;
    this.classList.toggle('on', shuffleOn);
    safeCall(function(){ player.setShuffle(shuffleOn); });
    if (shuffleOn) safeCall(function(){ player.nextVideo(); });
  });

  function setMuted(m){
    isMuted = m;
    var btn = document.getElementById('btnMute');
    if (m) {
      safeCall(function(){ player.mute(); });
      btn.innerHTML = '<span class="glyph">&#128263;</span> muted';
      btn.classList.remove('on');
    } else {
      safeCall(function(){ player.unMute(); player.setVolume(80); });
      btn.innerHTML = '<span class="glyph">&#128266;</span> sound';
      btn.classList.add('on');
    }
  }
  document.getElementById('btnMute').addEventListener('click', function(){
    setMuted(!isMuted);
    document.getElementById('unmuteOverlay').classList.add('hidden');
  });
  document.getElementById('unmuteOverlay').addEventListener('click', function(){
    this.classList.add('hidden');
    setMuted(false);
    safeCall(function(){ player.playVideo(); });
  });
</script>
